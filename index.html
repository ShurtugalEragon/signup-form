<!DOCTYPE html>
<html>
    <head>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <div id="page-container">
            <div id="bg-img-container">
                <img src="bg-image.jpg" id="bg-img">
            </div>
            <div id="content-container">
                <div class="content-padding" id="header">
                    <p>This is not a real online service! You know you need something
                    like this in your life to help you realize your deepest dreams.
                    Sign up now to get started
                    </p>
                    <p>You know you want to</p>
                </div>
                <form action="" method="post">
                    <div id="form-color" class="content-padding">
                        <legend>Let's do this!</legend>

                        <div class="input-row">
                            <div class="input-col">
                                <label for="first_name">First Name</label>
                                <input type="text" id="first_name" name="first_name">

                                <label for="email">Email</label>
                                <input type="email" id="email" name="email">

                                <label for="password">Password</label>
                                <input type="password" id="password" name="password">
                            </div>

                            <div class="input-col">
                                <label for="last_name">Last Name</label>
                                <input type="text" id="last_name" name="last_name">

                                <label for="phone_number">Phone Number</label>
                                <input type="tel" id="phone_number" name="phone_number">

                                <label for="confirm_password">Confirm Password</label>
                                <input type="password" id="password" name="password">
                            </div>
                        </div>
                    </div>
                    <button type="submit" id="submit-button">Create Account</button>
                </form>

                <p class="content-padding">Already have an account? <a href="">Log in</a></p>
            </div>
        </div>
    </body>
</html>
